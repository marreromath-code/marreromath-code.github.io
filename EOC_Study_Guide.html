<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOC Study Guide — Algebra: Concepts & Connections</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee;--surface:#ffffff;--card:#fdfcf9;--border:#e0d9cc;
  --text:#1c1712;--muted:#7a6e5f;--accent:#1d6954;--alight:rgba(29,105,84,.08);
  --red:#c0392b;--rlight:rgba(192,57,43,.07);
  --blue:#1a5276;--blight:rgba(26,82,118,.07);
  --gold:#b7770d;--glight:rgba(183,119,13,.07);
  --purple:#6c3483;--plight:rgba(108,52,131,.07);
  --teal:#117a65;--tlight:rgba(17,122,101,.08);
  --slate:#2c3e50;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.site-header{
  background:var(--slate);color:#fff;
  padding:26px 24px 20px;text-align:center;
  border-bottom:4px solid var(--accent);
}
.site-header h1{font-family:'Lora',serif;font-size:clamp(1.5rem,4vw,2.3rem);font-weight:700;letter-spacing:-.01em;margin-bottom:4px;}
.site-header p{font-size:.87rem;opacity:.6;}

/* ── TOPIC NAV ── */
.topic-nav-wrap{background:var(--surface);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;padding:10px 18px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.topic-nav-wrap button{
  background:transparent;border:1.5px solid var(--border);color:var(--muted);
  font-family:'Inter',sans-serif;font-size:.73rem;font-weight:600;
  padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.topic-nav-wrap button:hover{border-color:var(--accent);color:var(--accent);}
.topic-nav-wrap button.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── MAIN ── */
main{max-width:1000px;margin:0 auto;padding:24px 20px 80px;}

/* ── TOPIC SECTION ── */
.topic-sec{display:none;animation:fadeUp .3s ease;}
.topic-sec.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── TOPIC HERO ── */
.topic-hero{
  display:flex;align-items:center;gap:16px;
  padding:20px 24px;border-radius:14px;margin-bottom:22px;
  border-left:5px solid var(--accent);
  background:linear-gradient(135deg,var(--surface) 60%,var(--alight));
  border:1.5px solid var(--border);
}
.topic-hero .th-icon{font-size:2.8rem;flex-shrink:0;}
.topic-hero .th-title{font-family:'Lora',serif;font-size:1.7rem;font-weight:700;margin-bottom:3px;}
.topic-hero .th-sub{font-size:.87rem;color:var(--muted);line-height:1.6;}
.topic-hero .th-tag{
  margin-left:auto;padding:5px 13px;border-radius:20px;
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  background:var(--alight);color:var(--accent);border:1px solid rgba(29,105,84,.2);
  white-space:nowrap;align-self:flex-start;
}

/* ── SECTION GRID ── */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.sec-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;}

/* ── CARDS ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:20px 22px;margin-bottom:16px;}
.card-header{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.card-header .ch-icon{font-size:1.25rem;}
.card-header .ch-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);}
.card-header .ch-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;color:var(--text);line-height:1.2;}

/* ── VOCAB ── */
.vocab-list{display:flex;flex-direction:column;gap:10px;}
.vocab-item{display:flex;flex-direction:column;gap:3px;padding:11px 14px;background:var(--bg);border-radius:9px;border-left:3px solid var(--accent);}
.vocab-term{font-weight:700;font-size:.88rem;color:var(--accent);}
.vocab-def{font-size:.83rem;color:var(--muted);line-height:1.55;}
.vocab-ex{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--slate);margin-top:2px;}

/* ── KEY IDEAS ── */
.idea-list{display:flex;flex-direction:column;gap:8px;}
.idea-item{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;background:var(--bg);border-radius:8px;}
.idea-bullet{min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;background:var(--accent);color:#fff;}
.idea-text{font-size:.87rem;line-height:1.6;}
.idea-text strong{color:var(--text);}
.idea-text em{font-style:italic;color:var(--muted);}

/* ── FORMULA BOX ── */
.formula-box{font-family:'JetBrains Mono',monospace;font-size:.95rem;text-align:center;padding:12px 18px;background:var(--glight);border:1.5px solid rgba(183,119,13,.2);border-radius:9px;margin:10px 0;color:var(--gold);}
.formula-label{font-family:'Inter',sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}

/* ── FORMULA GRID ── */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:10px;}
.fcard{background:var(--bg);border-radius:9px;padding:12px 14px;border:1px solid var(--border);}
.fcard .fl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.fcard .fv{font-family:'JetBrains Mono',monospace;font-size:.92rem;color:var(--slate);}
.fcard .fd{font-size:.78rem;color:var(--muted);margin-top:3px;}

/* ── TABLE ── */
.ref-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:10px;}
.ref-table th{background:var(--slate);color:#fff;padding:9px 13px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;}
.ref-table td{padding:9px 13px;border-bottom:1px solid var(--border);}
.ref-table tr:last-child td{border:none;}
.ref-table tr:nth-child(even) td{background:var(--bg);}
.ref-table .mono{font-family:'JetBrains Mono',monospace;color:var(--accent);}

/* ── APPLICATIONS ── */
.app-list{display:flex;flex-direction:column;gap:9px;}
.app-item{display:flex;gap:11px;padding:12px 15px;background:var(--tlight);border:1px solid rgba(17,122,101,.15);border-radius:9px;font-size:.86rem;line-height:1.55;}
.app-icon{font-size:1.3rem;flex-shrink:0;}

/* ── GRAPH CANVAS ── */
.graph-wrap{background:#0f1923;border-radius:11px;overflow:hidden;border:1.5px solid #2c3e50;}
.graph-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;margin-bottom:6px;}
canvas.gc{width:100%;display:block;}

/* ── GRAPH FEATURES TABLE ── */
.gf-list{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.gf-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:7px;font-size:.84rem;border:1px solid var(--border);}
.gf-key{font-weight:600;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.7px;}
.gf-val{font-family:'JetBrains Mono',monospace;font-size:.88rem;color:var(--accent);}

/* ── COMPARISON BOX ── */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
.comp-card{border-radius:10px;padding:14px 16px;}
.comp-card.green{background:rgba(29,105,84,.08);border:1.5px solid rgba(29,105,84,.2);}
.comp-card.red{background:rgba(192,57,43,.08);border:1.5px solid rgba(192,57,43,.2);}
.comp-card.blue{background:rgba(26,82,118,.07);border:1.5px solid rgba(26,82,118,.2);}
.comp-card.gold{background:rgba(183,119,13,.07);border:1.5px solid rgba(183,119,13,.2);}
.comp-title{font-weight:700;font-size:.88rem;margin-bottom:7px;}
.comp-card.green .comp-title{color:var(--teal);}
.comp-card.red .comp-title{color:var(--red);}
.comp-card.blue .comp-title{color:var(--blue);}
.comp-card.gold .comp-title{color:var(--gold);}
.comp-item{font-size:.81rem;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.comp-item:last-child{border:none;}

/* ── BADGE ── */
.badge{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 9px;border-radius:20px;margin-left:6px;}
.badge-green{background:var(--tlight);color:var(--teal);border:1px solid rgba(17,122,101,.25);}
.badge-blue{background:var(--blight);color:var(--blue);border:1px solid rgba(26,82,118,.2);}
.badge-red{background:var(--rlight);color:var(--red);border:1px solid rgba(192,57,43,.2);}
.badge-gold{background:var(--glight);color:var(--gold);border:1px solid rgba(183,119,13,.2);}

/* ── HIGHLIGHT BOX ── */
.highlight{padding:13px 16px;border-radius:10px;font-size:.87rem;margin:12px 0;line-height:1.6;}
.highlight.green{background:var(--tlight);border-left:4px solid var(--teal);}
.highlight.gold{background:var(--glight);border-left:4px solid var(--gold);}
.highlight.red{background:var(--rlight);border-left:4px solid var(--red);}
.highlight.blue{background:var(--blight);border-left:4px solid var(--blue);}

/* RESPONSIVE */
@media(max-width:620px){
  .sec-grid,.sec-grid-3,.compare-grid{grid-template-columns:1fr;}
  .topic-hero{flex-wrap:wrap;}
  .topic-hero .th-tag{margin-left:0;}
}
</style>
</head>

<div class="topic-nav-wrap" id="topicNav"></div>
<main id="mainContent"></main>

<script>
// ── TOPIC DATA ──
const TOPICS = [

// ════════════════════════════════════════
// 1. LINEAR FUNCTIONS
// ════════════════════════════════════════
{id:"linear",icon:"📐",title:"Linear Functions",tag:"Algebra",
 sub:"Slope, intercepts, forms of a line, modeling data",
 color:"#1d6954",
 overview:"A linear function creates a straight-line graph. The rate of change (slope) is constant. It is one of the most fundamental function types in algebra.",
 vocab:[
   {term:"Linear Function",def:"A function whose graph is a straight line.",ex:"f(x) = 2x + 3"},
   {term:"Slope (m)",def:"The rate of change; rise over run. How steep the line is.",ex:"m = (y₂−y₁)/(x₂−x₁)"},
   {term:"y-Intercept (b)",def:"Where the line crosses the y-axis (when x = 0).",ex:"In y=2x+3, b=3"},
   {term:"x-Intercept",def:"Where the line crosses the x-axis (when y = 0).",ex:"Set f(x)=0 and solve for x"},
   {term:"Slope-Intercept Form",def:"y = mx + b, where m is slope and b is y-intercept.",ex:"y = ½x − 4"},
   {term:"Rate of Change",def:"How much y changes per 1-unit increase in x. Same as slope.",ex:"If m=3, y increases by 3 each time x increases by 1"},
 ],
 ideas:[
   "Positive slope → line rises left to right. Negative slope → line falls left to right.",
   "Zero slope → horizontal line. Undefined slope → vertical line.",
   "To find slope from a table: m = Δy/Δx (change in y divided by change in x).",
   "To find slope from two points: m = (y₂ − y₁)/(x₂ − x₁)",
   "y-intercept: set x = 0 and solve. x-intercept: set y = 0 and solve.",
   "A function is linear if its table has a CONSTANT rate of change (equal differences in y for equal differences in x).",
 ],
 apps:[
   {icon:"🚗",text:"Distance = rate × time. If a car travels at 60 mph, d(t) = 60t is linear."},
   {icon:"💰",text:"Catering: Cost = per-person fee × guests + flat fee. C(x) = 6x + 100 is linear."},
   {icon:"📱",text:"Phone plan: Monthly bill = $0.10 per text + $25 base. B(t) = 0.1t + 25."},
   {icon:"🌡️",text:"Converting Celsius to Fahrenheit: F = (9/5)C + 32 — a linear function."},
 ],
 formulas:[
   {l:"Slope",v:"m = (y₂−y₁)/(x₂−x₁)",d:"Rise over run between two points"},
   {l:"Slope-Intercept",v:"y = mx + b",d:"Most common form"},
   {l:"Point-Slope",v:"y−y₁ = m(x−x₁)",d:"Given slope + one point"},
   {l:"Standard Form",v:"Ax + By = C",d:"A, B, C are integers"},
 ],
 graphFeatures:[
   {k:"Shape",v:"Straight line"},
   {k:"Slope > 0",v:"Line rises (↗)"},
   {k:"Slope < 0",v:"Line falls (↘)"},
   {k:"Slope = 0",v:"Horizontal line (→)"},
   {k:"y-intercept",v:"Point (0, b)"},
   {k:"x-intercept",v:"Point (−b/m, 0)"},
 ],
 graphFn: "linear"
},

// ════════════════════════════════════════
// 2. SEQUENCES
// ════════════════════════════════════════
{id:"sequences",icon:"🔢",title:"Sequences",tag:"Patterns",
 sub:"Arithmetic & geometric, recursive & explicit formulas",
 color:"#6c3483",
 overview:"A sequence is an ordered list of numbers following a pattern. Arithmetic sequences add a constant (common difference). Geometric sequences multiply by a constant (common ratio).",
 vocab:[
   {term:"Arithmetic Sequence",def:"Each term is found by ADDING a constant (d) to the previous term.",ex:"3, 7, 11, 15 … (d = +4)"},
   {term:"Geometric Sequence",def:"Each term is found by MULTIPLYING by a constant ratio (r).",ex:"2, 6, 18, 54 … (r = 3)"},
   {term:"Common Difference (d)",def:"The constant added in an arithmetic sequence.",ex:"In 5, 8, 11, 14 … d = 3"},
   {term:"Common Ratio (r)",def:"The constant multiplied in a geometric sequence.",ex:"In 4, 12, 36 … r = 3"},
   {term:"Recursive Formula",def:"Defines each term using the PREVIOUS term. Must also state a₁.",ex:"aₙ = aₙ₋₁ + 4; a₁ = 7"},
   {term:"Explicit Formula",def:"Finds any term directly using n (position number). No prior term needed.",ex:"aₙ = 3n + 4 or aₙ = 2(3)ⁿ⁻¹"},
 ],
 ideas:[
   "Arithmetic: To find d, subtract any term from the next term: d = aₙ − aₙ₋₁",
   "Geometric: To find r, divide any term by the previous term: r = aₙ ÷ aₙ₋₁",
   "Arithmetic explicit: aₙ = a₁ + (n−1)d — also written as a linear function f(n) = mn + b",
   "Geometric explicit: aₙ = a₁ · rⁿ⁻¹ — notice this is like an exponential function!",
   "Recursive formulas always need two pieces: the rule AND the first term (a₁).",
   "If ratio is constant → geometric. If difference is constant → arithmetic.",
 ],
 apps:[
   {icon:"🏦",text:"Compound interest generates a geometric sequence: each year's balance = previous × (1 + r)."},
   {icon:"🏃",text:"A runner adds 0.5 miles per week: 3, 3.5, 4, 4.5 … arithmetic sequence."},
   {icon:"🦠",text:"Bacteria that double every hour: 1, 2, 4, 8, 16 … geometric sequence with r = 2."},
   {icon:"📅",text:"A salary that increases by $2,000/year: $45,000; $47,000; $49,000 … arithmetic."},
 ],
 formulas:[
   {l:"Arithmetic Explicit",v:"aₙ = a₁ + (n−1)d",d:"nth term of arithmetic sequence"},
   {l:"Geometric Explicit",v:"aₙ = a₁ · rⁿ⁻¹",d:"nth term of geometric sequence"},
   {l:"Arithmetic Recursive",v:"aₙ = aₙ₋₁ + d; a₁",d:"Needs a₁ stated separately"},
   {l:"Geometric Recursive",v:"aₙ = r · aₙ₋₁; a₁",d:"Needs a₁ stated separately"},
 ],
 graphFeatures:[
   {k:"Arithmetic graph",v:"Straight line (linear)"},
   {k:"Geometric graph",v:"Curved (exponential)"},
   {k:"Arithmetic domain",v:"Positive integers only"},
   {k:"r > 1",v:"Geometric increases"},
   {k:"0 < r < 1",v:"Geometric decreases"},
   {k:"r < 0",v:"Geometric alternates +/−"},
 ],
 graphFn:"sequences"
},

// ════════════════════════════════════════
// 3. FUNCTIONS, DOMAIN & RANGE
// ════════════════════════════════════════
{id:"functions",icon:"🔭",title:"Functions, Domain & Range",tag:"Functions",
 sub:"Function notation, domain, range, context restrictions",
 color:"#1a5276",
 overview:"A function assigns exactly ONE output to each input. The domain is the set of valid inputs and the range is the set of possible outputs. Context often restricts these.",
 vocab:[
   {term:"Function",def:"A rule where each input (x) has exactly ONE output (y). Passes the vertical line test.",ex:"f(x) = 3x + 1"},
   {term:"Domain",def:"The set of all valid INPUT values (x-values).",ex:"D: {x | x ≥ 0} or D: all positive integers"},
   {term:"Range",def:"The set of all possible OUTPUT values (y-values, or f(x) values).",ex:"R: {y | y > −4}"},
   {term:"Function Notation",def:"f(x) means 'the value of function f at x'. The output when x is the input.",ex:"f(3) = 2(3) + 1 = 7"},
   {term:"Continuous Domain",def:"Domain that includes all real numbers in an interval (no gaps).",ex:"Time, distance, temperature"},
   {term:"Discrete Domain",def:"Domain made of separate, countable values (often integers).",ex:"Number of people, number of animals"},
 ],
 ideas:[
   "Domain restriction from context: you can't have negative time, fractional people, or zero items.",
   "Discrete vs. Continuous: counting things (integers) vs. measuring things (real numbers).",
   "f(a) = b means: when the input is a, the output is b. x is the input, f(x) is the output.",
   "The vertical line test: if any vertical line touches the graph more than once, it is NOT a function.",
   "A function can have the same output for different inputs, but NOT the same input giving different outputs.",
   "For a quadratic domain restricted by context: solve f(x) = 0 to find the endpoints of the domain.",
 ],
 apps:[
   {icon:"🐟",text:"Fish food needed (y) as a function of number of fish (x): domain = positive integers."},
   {icon:"🏃",text:"Distance a runner travels (y) as a function of time (x): domain = non-negative real numbers."},
   {icon:"🏪",text:"Store customers f(x) = –4(x–4.5)²+81: domain restricted to hours when f(x) ≥ 0, so 0 ≤ x ≤ 9."},
   {icon:"🌱",text:"Plant height as function of time since planting: domain includes negatives if 'time before' matters."},
 ],
 formulas:[
   {l:"Function Notation",v:"f(x) → read 'f of x'",d:"Output when input is x"},
   {l:"Domain from Context",v:"Solve for where f(x) is valid",d:"Consider real-world restrictions"},
   {l:"Vertical Line Test",v:"1 intersection = function",d:"More than 1 = NOT a function"},
   {l:"Average Rate of Change",v:"[f(b)−f(a)] / (b−a)",d:"Over interval [a, b]"},
 ],
 graphFeatures:[
   {k:"Discrete graph",v:"Isolated points (dots only)"},
   {k:"Continuous graph",v:"Unbroken curve or line"},
   {k:"Domain on graph",v:"Left-right extent (x-span)"},
   {k:"Range on graph",v:"Up-down extent (y-span)"},
   {k:"x-intercept",v:"Where graph crosses x-axis"},
   {k:"y-intercept",v:"Where graph crosses y-axis"},
 ],
 graphFn:"functions"
},

// ════════════════════════════════════════
// 4. SYSTEMS OF LINEAR INEQUALITIES
// ════════════════════════════════════════
{id:"inequalities",icon:"📊",title:"Systems of Linear Inequalities",tag:"Systems",
 sub:"Writing, graphing, shading, testing points",
 color:"#922b21",
 overview:"A system of linear inequalities has two or more inequalities. The solution is the REGION where both shaded areas overlap on the coordinate plane.",
 vocab:[
   {term:"Linear Inequality",def:"Like a linear equation but with <, >, ≤, or ≥ instead of =.",ex:"2x + 3y ≤ 80"},
   {term:"Boundary Line",def:"The line you graph first. Solid line for ≤ or ≥; dashed line for < or >.",ex:"Graph 2x+3y=80 as a solid line"},
   {term:"Solution Region",def:"The shaded area satisfying both inequalities. Any point inside satisfies the system.",ex:"The overlap/intersection of both shaded regions"},
   {term:"Test Point",def:"A point you substitute into both inequalities to check if it's a solution.",ex:"Test (0,0): does 0 ≤ 5? Yes. Does 0 > 3? No."},
   {term:"System of Inequalities",def:"Two or more inequalities that must be satisfied at the same time.",ex:"x + y ≤ 10 AND 2x + y ≥ 6"},
 ],
 ideas:[
   "Graph each inequality separately, then find where BOTH shaded regions overlap.",
   "Solid line (≤ or ≥): points ON the line ARE solutions. Dashed line (< or >): points on the line are NOT.",
   "To shade: pick a test point NOT on the line (like (0,0)). If it satisfies the inequality, shade that side.",
   "To check if a point is a solution: substitute into ALL inequalities. It must satisfy EVERY one.",
   "Context clue: 'at most' → ≤ ; 'at least' → ≥ ; 'more than' → > ; 'less than' → <",
   "Two inequalities with the same variables form a system. The solution is their intersection region.",
 ],
 apps:[
   {icon:"🏪",text:"Computer store: 875x + 235y ≤ 10,000 (budget) AND 4x + 3y ≤ 45 (space). x=computers, y=tablets."},

 ],
 formulas:[

   {l:"Minimum requirement",v:"value₁·x + value₂·y ≥ min",d:"At least = ≥"},

   {l:"Slope of boundary",v:"Rewrite as y = mx + b",d:"Then shade above or below"},
 ],
 graphFeatures:[
   {k:"≤ or ≥ boundary",v:"SOLID line"},
   {k:"< or > boundary",v:"DASHED line"},
   {k:"Shade above boundary",v:"For y > or y ≥"},
   {k:"Shade below boundary",v:"For y < or y ≤"},
   {k:"Solution region",v:"Overlap of both shadings"},
   {k:"Feasible point",v:"Any point in overlap region"},
 ],
 graphFn:"inequalities"
},

// ════════════════════════════════════════
// 5. IRRATIONAL NUMBERS & RADICALS
// ════════════════════════════════════════
{id:"radicals",icon:"√",title:"Irrational Numbers & Radicals",tag:"Number Sense",

// ── GRAPH DRAWING ENGINE ──
function gx(c){ return c.getContext('2d'); }

function drawAxes(ctx, W, H, pad, xMin, xMax, yMin, yMax){
  const tx = v => pad + (v-xMin)/(xMax-xMin)*(W-2*pad);
  const ty = v => H-pad - (v-yMin)/(yMax-yMin)*(H-2*pad);
  ctx.fillStyle='#0f1923'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1;
  for(let x=Math.ceil(xMin);x<=xMax;x++){ctx.beginPath();ctx.moveTo(tx(x),pad);ctx.lineTo(tx(x),H-pad);ctx.stroke();}
  for(let y=Math.ceil(yMin);y<=yMax;y++){ctx.beginPath();ctx.moveTo(pad,ty(y));ctx.lineTo(W-pad,ty(y));ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad,ty(0));ctx.lineTo(W-pad,ty(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx(0),pad);ctx.lineTo(tx(0),H-pad);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.35)'; ctx.font='10px JetBrains Mono,monospace'; ctx.textAlign='center';
  for(let x=Math.ceil(xMin);x<=xMax;x+=2){if(x!==0)ctx.fillText(x,tx(x),H-pad+13);}
  ctx.textAlign='right';
  for(let y=Math.ceil(yMin);y<=yMax;y+=2){if(y!==0)ctx.fillText(y,pad-4,ty(y)+4);}
  return {tx,ty};
}

function curve(ctx,tx,ty,fn,color,W,pad,xMin,xMax,yMin,yMax,lw){
  ctx.strokeStyle=color; ctx.lineWidth=lw||2.5; ctx.beginPath();
  let started=false;
  for(let px=pad;px<=W-pad;px++){
    const x=xMin+(px-pad)/(W-2*pad)*(xMax-xMin);
    const y=fn(x);
    if(!isFinite(y)||y<yMin-30||y>yMax+30){started=false;continue;}
    if(!started){ctx.moveTo(px,ty(y));started=true;}else ctx.lineTo(px,ty(y));
  }
  ctx.stroke();
}

function dot(ctx,tx,ty,x,y,color,r){
  ctx.beginPath();ctx.arc(tx(x),ty(y),r||5.5,0,2*Math.PI);ctx.fillStyle=color;ctx.fill();
}

function lbl(ctx,tx,ty,x,y,text,color,dx,dy){
  ctx.fillStyle=color||'#fff'; ctx.font='11px JetBrains Mono,monospace'; ctx.textAlign='left';
  ctx.fillText(text,tx(x)+(dx||6),ty(y)+(dy||4));
}

function drawGraph(id){

      geom.forEach(p=>{ctx.beginPath();ctx.arc(tx(p.n),ty(p.v),5,0,2*Math.PI);ctx.fillStyle='#e67e22';ctx.fill();});

    functions(){

    radicals(){
      lblEl.textContent='Number line showing rational vs. irrational values';

      ctx.fillStyle='rgba(241,196,15,.8)';ctx.fillText('Maximum = −5',tx(-3.5),ty(0.4));

      curve(ctx,tx,ty,x=>6*Math.pow(0.6,x),'#e74c3c',W,32,-5,5,-1,12,2.5);
      ctx.strokeStyle='rgba(255,255,255,.3)';ctx.setLineDash([5,4]);ctx.lineWidth=1;

      dot(ctx,tx,ty,0,2,'#2ecc71',4);lbl(ctx,tx,ty,0,2,'(0,2)','rgba(46,204,113,.9)',6,-4);
      dot(ctx,tx,ty,0,6,'#e74c3c',4);lbl(ctx,tx,ty,0,6,'(0,6)','rgba(231,76,60,.9)',6,4);

      ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.stroke();

      pts.forEach(([x,y])=>{ctx.beginPath();ctx.arc(tx(x),ty(y),4,0,2*Math.PI);ctx.fillStyle='rgba(52,152,219,.75)';ctx.fill();});
      // Line of best fit
      ctx.strokeStyle='#f1c40f';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(tx(0),ty(10));ctx.lineTo(tx(10),ty(95));ctx.stroke();

      ctx.strokeStyle='rgba(231,76,60,.6)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);

      ctx.beginPath();ctx.moveTo(tx(7),ty(75));ctx.lineTo(tx(7),ty(73));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(241,196,15,.8)';ctx.font='11px JetBrains Mono,monospace';ctx.textAlign='left';

      ctx.fillText('Hours Studied (x)',W/2,H-6);
      ctx.save();ctx.translate(14,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('Test Score (y)',0,0);ctx.restore();
    },

    geometry(){
      lblEl.textContent='Distance, Midpoint, and Slope on the coordinate plane';
      lblEl.textContent='Distance, Midpoint, and Slope on the coordinate plane';
      const{tx,ty}=drawAxes(ctx,W,H,32,-1,8,-1,8);
      // Triangle
      const pts=[[1,2],[6,2],[4,7]];
      const cols=['#e74c3c','#2ecc71','#3498db'];
      ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));

      ctx.fillText('d = √(Δx²+Δy²)',tx(2),ty(7.5));
    }
  };

  if(G[TOPICS.find(t=>t.id===id).graphFn]) G[TOPICS.find(t=>t.id===id).graphFn]();
}
